name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag Published Package
        if: steps.changesets.outputs.published == 'true'
        id: tag
        run: |
          TAG="$(node - <<'NODE'
          const pkgs = JSON.parse(process.env.PUBLISHED_PACKAGES || '[]');
          const pkg = pkgs.find((p) => p.name === '@aureuma/svelta') || pkgs[0];
          if (!pkg) process.exit(0);
          process.stdout.write(`${pkg.name}@${pkg.version}`);
          NODE
          )"

          if [ -z "$TAG" ]; then
            echo "No published package found; skipping tag."
            exit 0
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          git tag "$TAG"
          git push origin "$TAG"
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}

      - name: GitHub Release
        if: steps.changesets.outputs.published == 'true' && steps.tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
