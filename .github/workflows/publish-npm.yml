name: Publish NPM

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish (for example v0.3.1)
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: Enable Corepack
        run: corepack enable

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          pkg_version="$(node -p 'require("./package.json").version')"
          if [[ "$version" != "$pkg_version" ]]; then
            echo "tag version ($version) does not match package.json ($pkg_version)" >&2
            exit 1
          fi

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Resolve publish guard
        id: publish_guard
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${NODE_AUTH_TOKEN}" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.publish_guard.outputs.publish == 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          pnpm publish --access public --provenance

      - name: Skip notice (missing NPM token)
        if: steps.publish_guard.outputs.publish != 'true'
        run: |
          echo "NPM_TOKEN is not configured; skipping npm publish."
