<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="theme-color"
      content="#f7f4ec"
      media="(prefers-color-scheme: light)" />
    <meta
      name="theme-color"
      content="#0c0d10"
      media="(prefers-color-scheme: dark)" />
    <style>
      html,
      body {
        margin: 0;
        background-color: #f7f4ec;
      }
      html.dark,
      html.dark body {
        background-color: #0c0d10;
      }
    </style>
    <script>
      (function () {
        try {
          var key = 'cv-theme';
          var stored = localStorage.getItem(key);
          var mode =
            stored === 'light' || stored === 'dark' || stored === 'system'
              ? stored
              : 'system';
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var useDark = mode === 'dark' || (mode === 'system' && prefersDark);
          var root = document.documentElement;
          var lightColor = '#f7f4ec';
          var darkColor = '#0c0d10';
          root.classList.toggle('dark', useDark);
          root.dataset.theme = mode;
          root.style.colorScheme = useDark ? 'dark' : 'light';
          root.style.backgroundColor = useDark ? darkColor : lightColor;
          if (document.body) {
            document.body.style.backgroundColor = useDark
              ? darkColor
              : lightColor;
          }
          var themeTags = document.querySelectorAll(
            'meta[name="theme-color"]'
          );
          themeTags.forEach(function (tag) {
            var media = tag.getAttribute('media');
            if (!media) {
              tag.setAttribute('content', useDark ? darkColor : lightColor);
              return;
            }
            if (media.includes('prefers-color-scheme: dark')) {
              tag.setAttribute('content', darkColor);
            } else if (media.includes('prefers-color-scheme: light')) {
              tag.setAttribute('content', lightColor);
            }
          });
        } catch (err) {
          // Ignore theme boot errors to avoid blocking render.
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
